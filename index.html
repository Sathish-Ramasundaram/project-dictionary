<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dictionary - SR</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1>Dictionary</h1>

    <div class="search-row">
      <input id="wordInput" type="text" placeholder="Type English word..." />
      <button id="searchBtn">Search</button>
    </div>

    <p id="status" class="muted">Loading words...</p>

    <div id="dictionarySection" class="card">
      <h2>Dictionary Data</h2>
      <div class="filter-row">
        <button class="filter-btn active" data-sort-key="English">English</button>
        <button class="filter-btn" data-sort-key="Tamil">Tamil</button>
        <button class="filter-btn" data-sort-key="Kannada">Kannada</button>
        <button class="filter-btn" data-sort-key="Hindi">Hindi</button>
      </div>

      <div class="table-wrap">
        <table id="dictionaryTable">
          <thead>
            <tr>
              <th>English</th>
              <th>Meaning</th>
              <th>Tamil</th>
              <th>Kannada</th>
              <th>Hindi</th>
            </tr>
          </thead>
          <tbody id="dictionaryBody"></tbody>
        </table>
      </div>
    </div>

    <div id="result" class="card hidden">
      <h2 id="english"></h2>
      <p id="meaning"></p>
      <div id="imageWrap"></div>

      <p class="lang"><strong>Tamil:</strong> <span id="tamil"></span></p>
      <p class="lang"><strong>Kannada:</strong> <span id="kannada"></span></p>
      <p class="lang"><strong>Hindi:</strong> <span id="hindi"></span></p>
    </div>

    <script src="script.js"></script>
    </body>
</html>
